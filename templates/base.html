<!DOCTYPE html>
<html lang="en" data-theme="{{ theme_name }}" data-mode="{{ theme_mode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebPlay</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha384-1H217gwSVyLSIfaLxHbE7dRb3v4mYCKbpQvzx0cegeju1MVsGrX5xXxAvs/HgeFs" crossorigin="anonymous"></script>
    <!-- Icons & Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}?v=2">
    <!-- Theme Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='themes.css') }}">
    
    <style>
        :root {
            {{ theme_css | safe }}
            color-scheme: {% if theme_mode == 'dark' %}dark{% else %}light{% endif %};
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: var(--th-bg); color: var(--th-text);">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass-panel border-b-0 h-16 flex items-center justify-between px-4 md:px-6" style="border-bottom: 1px solid var(--th-border);">
        <a href="/{{ k }}" class="flex items-center gap-2 group">
            <span class="material-icons-round text-[var(--th-accent)] text-3xl group-hover:scale-110 transition">play_circle</span>
            <span class="font-mono text-xl tracking-widest font-bold hidden sm:block" style="color: var(--th-text);">WEBPLAY</span>
        </a>
        
        <!-- Search Bar -->
        <form action="/" method="GET" class="flex-grow max-w-md mx-4 hidden md:block">
            {% if request.args.get('key') %}<input type="hidden" name="key" value="{{ request.args.get('key') }}">{% endif %}
            <div class="relative">
                <input type="text" name="q" placeholder="Search library..." value="{{ request.args.get('q', '') }}"
                    class="w-full rounded-full px-4 py-1.5 text-sm transition"
                    style="background: var(--th-input-bg); border: 1px solid var(--th-input-border); color: var(--th-text);"
                    onfocus="this.style.borderColor='var(--th-accent)'"
                    onblur="this.style.borderColor='var(--th-input-border)'">
                <span class="material-icons-round absolute right-3 top-1.5 text-[var(--th-text-secondary)] text-sm">search</span>
            </div>
        </form>

        <div class="flex items-center gap-2 mr-2">
            <!-- Theme Picker -->
            <div class="relative group">
                <button class="p-2 rounded-full transition" style="color: var(--th-text-secondary); hover:background: var(--th-hover);" title="Switch Theme">
                    <span class="material-icons-round">palette</span>
                </button>
                <div class="absolute right-0 top-full mt-2 w-48 rounded-xl shadow-xl overflow-hidden hidden group-hover:block z-50"
                     style="background: var(--th-surface); border: 1px solid var(--th-border);">
                    <div class="py-1">
                        {% for t in theme_list %}
                        <a href="#" data-theme-name="{{ t.slug }}"
                           class="block px-4 py-2 text-xs transition flex items-center gap-2"
                           style="color: var(--th-text-secondary);"
                           onmouseover="this.style.background='var(--th-hover)'"
                           onmouseout="this.style.background='transparent'">
                            <span class="material-icons-round text-sm" style="color: var(--th-accent);">{{ 'check' if t.slug == theme_name else 'radio_button_unchecked' }}</span>
                            {{ t.display }}
                        </a>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <button onclick="window.location.reload()" class="p-2 rounded-full transition" style="color: var(--th-text-secondary); hover:background: var(--th-hover);"><span class="material-icons-round">refresh</span></button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-20 px-3 md:px-8 pb-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-6 text-[var(--th-text-secondary)] text-[10px] font-mono uppercase tracking-widest" style="opacity: 0.6;">
        WebPlay • Stream Everywhere
    </footer>

    <script>
        // Theme switching via API
        document.querySelectorAll('[data-theme-name]').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                var themeName = this.getAttribute('data-theme-name');
                $.ajax({
                    url: '/api/theme',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ name: themeName }),
                    success: function() { window.location.reload(); },
                    error: function() { alert('Failed to switch theme'); }
                });
            });
        });
    </script>
</body>
</html>
