<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebPlay</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Icons & Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}?v=2">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nothingRed: "#D71920",
                        surface: "#0a0a0a",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Share Tech Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, rgba(30, 30, 30, 1) 0%, rgba(5, 5, 5, 1) 80%);
            color: #e0e0e0;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass-panel border-b-0 border-white/5 h-16 flex items-center justify-between px-4 md:px-6">
        <a href="" class="flex items-center gap-2 group">
            <span class="material-icons-round text-nothingRed text-3xl group-hover:scale-110 transition">play_circle</span>
            <span class="font-mono text-xl tracking-widest font-bold hidden block">WEBPLAY</span>
        </a>
        
        <!-- Search Bar (Added Feature) -->
        <form action="/" method="GET" class="flex-grow max-w-md mx-4 hidden md:block">
            {% if request.args.get('key') %}<input type="hidden" name="key" value="{{ request.args.get('key') }}">{% endif %}
            <div class="relative">
                <input type="text" name="q" placeholder="Search library..." value="{{ request.args.get('q', '') }}"
                    class="w-full bg-white/5 border border-white/10 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:border-nothingRed/50 transition">
                <span class="material-icons-round absolute right-3 top-1.5 text-white/30 text-sm">search</span>
            </div>
        </form>

        <div class="flex gap-3">
             <button onclick="window.location.reload()" class="p-2 rounded-full hover:bg-white/10 transition"><span class="material-icons-round">refresh</span></button>
        </div>
    </nav>

    <!-- Mobile Padding Fix -->
    <main class="flex-grow pt-20 px-3 md:px-8 pb-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-6 text-white/20 text-[10px] font-mono uppercase tracking-widest">
        WebPlay • Stream Everywhere
    </footer>
</body>
</html>
